services:
  optional-forgejo:
    image: codeberg.org/forgejo/forgejo:14-rootless
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -eu
        case "${GIT_FORGE_ENABLE_PUSH_CREATE:-0}" in
          1|true|TRUE|yes|YES|on|ON)
            export FORGEJO__repository__ENABLE_PUSH_CREATE_USER=true
            export FORGEJO__repository__ENABLE_PUSH_CREATE_ORG=true
            ;;
          *)
            export FORGEJO__repository__ENABLE_PUSH_CREATE_USER=false
            export FORGEJO__repository__ENABLE_PUSH_CREATE_ORG=false
            ;;
        esac
        # Fix permissions before starting
        if [[ -d "/var/lib/gitea/custom" ]]; then
          find "/var/lib/gitea/custom" -type d -exec chmod 775 {} + 2>/dev/null || true
          find "/var/lib/gitea/custom" -type f -exec chmod 664 {} + 2>/dev/null || true
        fi
        if [[ -d "/var/lib/gitea/queues" ]]; then
          find "/var/lib/gitea/queues" -type d -exec chmod 775 {} + 2>/dev/null || true
          find "/var/lib/gitea/queues" -type f -exec chmod 664 {} + 2>/dev/null || true
          rm -f "/var/lib/gitea/queues/common/LOCK" 2>/dev/null || true
        fi
        exec /usr/local/bin/docker-entrypoint.sh
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPTIONAL_GIT_FORGE_CPUS:-${AGENTIC_LIMIT_UI_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPTIONAL_GIT_FORGE_MEM:-${AGENTIC_LIMIT_UI_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "1000:1000"
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__server__ROOT_URL: http://127.0.0.1:${GIT_FORGE_HOST_PORT:-13010}/
      FORGEJO__server__DISABLE_SSH: "false"
      FORGEJO__server__START_SSH_SERVER: "true"
      FORGEJO__server__SSH_LISTEN_PORT: "2222"
      FORGEJO__server__SSH_PORT: "2222"
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO__service__REQUIRE_SIGNIN_VIEW: "true"
      FORGEJO__database__DB_TYPE: sqlite3
      FORGEJO__database__PATH: /var/lib/gitea/data/forgejo.db
      FORGEJO__repository__ROOT: /var/lib/gitea/git/repositories
      FORGEJO__repository__DEFAULT_BRANCH: main
      FORGEJO__repository__DEFAULT_PRIVATE: "private"
      GIT_FORGE_ENABLE_PUSH_CREATE: ${GIT_FORGE_ENABLE_PUSH_CREATE:-0}
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state:/var/lib/gitea
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/config:/var/lib/gitea/custom/conf
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/git:/var/lib/gitea/git
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/tmp:/var/lib/gitea/tmp
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/home:/var/lib/gitea/home
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/data:/var/lib/gitea/data
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/repo-archive:/var/lib/gitea/repo-archive
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/packages:/var/lib/gitea/packages
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/actions_log:/var/lib/gitea/actions_log
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/actions_artifacts:/var/lib/gitea/actions_artifacts
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/queues:/var/lib/gitea/queues
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/jwt:/var/lib/gitea/jwt
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/indexers:/var/lib/gitea/indexers
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/ssh:/var/lib/gitea/ssh
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/git/state/forgejo:/var/lib/gitea/forgejo
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O- http://127.0.0.1:3000/ >/dev/null
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks:
      - agentic

  optional-forgejo-loopback:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    depends_on:
      optional-forgejo:
        condition: service_healthy
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPTIONAL_GIT_FORGE_CPUS:-${AGENTIC_LIMIT_UI_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPTIONAL_GIT_FORGE_MEM:-${AGENTIC_LIMIT_UI_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /tmp/client_temp /tmp/proxy_temp /tmp/fastcgi_temp /tmp/uwsgi_temp /tmp/scgi_temp
        cat >/tmp/nginx.conf <<'NGINX'
        pid /tmp/nginx.pid;
        events {}
        http {
          client_body_temp_path /tmp/client_temp;
          proxy_temp_path /tmp/proxy_temp;
          fastcgi_temp_path /tmp/fastcgi_temp;
          uwsgi_temp_path /tmp/uwsgi_temp;
          scgi_temp_path /tmp/scgi_temp;
          server {
            listen 3000;
            location / {
              proxy_pass http://optional-forgejo:3000;
              proxy_http_version 1.1;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Host $$http_host;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_buffering off;
            }
          }
        }
        NGINX
        exec nginx -g 'daemon off;' -c /tmp/nginx.conf
    ports:
      - 127.0.0.1:${GIT_FORGE_HOST_PORT:-13010}:3000
      - 127.0.0.1:${GIT_FORGE_SSH_HOST_PORT:-2222}:2222
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O- http://127.0.0.1:3000/ >/dev/null
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 15s
    networks:
      - agentic
      - agentic-egress

  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPENWEBUI_CPUS:-${AGENTIC_LIMIT_UI_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPENWEBUI_MEM:-${AGENTIC_LIMIT_UI_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    security_opt:
      - no-new-privileges:true
    ports:
      - 127.0.0.1:${OPENWEBUI_HOST_PORT:-8080}:8080
    env_file:
      - ${AGENTIC_ROOT:-/srv/agentic}/openwebui/config/openwebui.env
    environment:
      WEBUI_AUTH: "True"
      ENABLE_SIGNUP: "False"
      OPENAI_API_BASE_URL: http://ollama-gate:11435/v1
      ENABLE_OPENAI_API: "True"
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama,ollama-gate,unbound,egress-proxy,localhost,127.0.0.1
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/openwebui/data:/app/backend/data
      - ${AGENTIC_ROOT:-/srv/agentic}/openwebui/static:/app/backend/open_webui/static
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          r=urllib.request.urlopen("http://127.0.0.1:8080/", timeout=5);
          sys.exit(0 if r.status in (200,302,401,403) else 1)'
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 30s
    networks:
      - agentic
      - agentic-egress

  openhands:
    image: agentic/openhands:local
    build:
      context: ..
      dockerfile: deployments/images/openhands/Dockerfile
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPENHANDS_CPUS:-${AGENTIC_LIMIT_UI_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPENHANDS_MEM:-2g}
    user: "42420:42420"
    group_add:
      - "${AGENT_RUNTIME_GID:-1000}"
    entrypoint:
      - /app/.venv/bin/uvicorn
      - openhands.server.listen:app
      - --host
      - 0.0.0.0
      - --port
      - "3000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - host.docker.internal:127.0.0.1
    ports:
      - 127.0.0.1:${OPENHANDS_HOST_PORT:-3000}:3000
    env_file:
      - ${AGENTIC_ROOT:-/srv/agentic}/openhands/config/openhands.env
    environment:
      # OpenHands 1.3 needs RUNTIME=cli for runtime bootstrap here, while app_server
      # sandbox selection is forced to process to avoid docker.sock dependency.
      RUNTIME: cli
      OH_SANDBOX_KIND: ProcessSandboxServiceInjector
      OH_SANDBOX_SPEC_KIND: ProcessSandboxSpecServiceInjector
      OH_APP_CONVERSATION_SANDBOX_STARTUP_POLL_FREQUENCY: "1"
      OH_PROCESS_SANDBOX_MAX_ACTIVE: "${OH_PROCESS_SANDBOX_MAX_ACTIVE:-2}"
      OH_APP_CONVERSATION_INIT_GIT_IN_EMPTY_WORKSPACE: "0"
      OH_SANDBOX_SPEC_SPECS_0: '{"id":"ghcr.io/openhands/agent-server:c775ff6-python","command":["python","-m","openhands.agent_server"],"initial_env":{"OH_ENABLE_VS_CODE":"0","OH_CONVERSATIONS_PATH":"/workspace/conversations"},"working_dir":"/workspace"}'
      OH_WEBHOOKS_0_BASE_URL: "${OH_WEBHOOKS_BASE_URL:-http://127.0.0.1:3000/api/v1/webhooks}"
      OH_WEBHOOKS_0_EVENT_BUFFER_SIZE: "${OH_WEBHOOKS_EVENT_BUFFER_SIZE:-1}"
      OH_WEBHOOKS_0_FLUSH_DELAY: "${OH_WEBHOOKS_FLUSH_DELAY:-1.0}"
      LLM_BASE_URL: http://ollama-gate:11435/v1
      AGENTIC_DEFAULT_MODEL: ${AGENTIC_DEFAULT_MODEL:-qwen3-coder:30b}
      AGENTIC_DEFAULT_MODEL_CONTEXT_WINDOW: ${AGENTIC_DEFAULT_MODEL_CONTEXT_WINDOW:-50909}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-${AGENTIC_DEFAULT_MODEL_CONTEXT_WINDOW:-50909}}
      AGENTIC_CONTEXT_COMPACTION_SOFT_PERCENT: ${AGENTIC_CONTEXT_COMPACTION_SOFT_PERCENT:-75}
      AGENTIC_CONTEXT_COMPACTION_DANGER_PERCENT: ${AGENTIC_CONTEXT_COMPACTION_DANGER_PERCENT:-90}
      AGENTIC_CONTEXT_BUDGET_TOKENS: ${AGENTIC_CONTEXT_BUDGET_TOKENS:-50909}
      AGENTIC_CONTEXT_COMPACTION_SOFT_TOKENS: ${AGENTIC_CONTEXT_COMPACTION_SOFT_TOKENS:-38181}
      AGENTIC_CONTEXT_COMPACTION_DANGER_TOKENS: ${AGENTIC_CONTEXT_COMPACTION_DANGER_TOKENS:-45818}
      AGENTIC_GIT_FORGE_BASE_URL: http://optional-forgejo:3000
      AGENTIC_GIT_FORGE_SHARED_NAMESPACE: ${GIT_FORGE_SHARED_NAMESPACE:-agentic}
      AGENT_HOME: /.openhands/home
      HOME: /.openhands/home
      XDG_CONFIG_HOME: /.openhands/home/.config
      XDG_CACHE_HOME: /.openhands/home/.cache
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,optional-forgejo,unbound,egress-proxy,host.docker.internal,localhost,127.0.0.1
      OH_PERSISTENCE_DIR: /.openhands
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/openhands/state:/.openhands
      - ${AGENTIC_ROOT:-/srv/agentic}/openhands/logs:/logs
      - ${AGENTIC_OPENHANDS_WORKSPACES_DIR:-${AGENTIC_ROOT:-/srv/agentic}/openhands/workspaces}:/workspace
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/git-forge/openhands.password:/run/secrets/git-forge.password:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/ssh/openhands:/.openhands/home/.ssh:ro
      - ${AGENTIC_REPO_ROOT:-.}/deployments/patches/openhands/process_sandbox_service.py:/app/openhands/app_server/sandbox/process_sandbox_service.py:ro
      - ${AGENTIC_REPO_ROOT:-.}/deployments/patches/openhands/live_status_app_conversation_service.py:/app/openhands/app_server/app_conversation/live_status_app_conversation_service.py:ro
      - ${AGENTIC_REPO_ROOT:-.}/deployments/patches/openhands/conversation.py:/app/openhands/server/routes/conversation.py:ro
      - ${AGENTIC_REPO_ROOT:-.}/deployments/patches/openhands/listen.py:/app/openhands/server/listen.py:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          r=urllib.request.urlopen("http://127.0.0.1:3000/", timeout=5);
          sys.exit(0 if r.status in (200,302,401,403) else 1)'
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 40s
    networks:
      - agentic
      - agentic-egress

  comfyui:
    image: agentic/comfyui:local
    build:
      context: ..
      dockerfile: deployments/images/comfyui/Dockerfile
      args:
        COMFYUI_REF: ${COMFYUI_REF:-master}
        COMFYUI_MANAGER_REPO: ${COMFYUI_MANAGER_REPO:-https://github.com/ltdrdata/ComfyUI-Manager.git}
        COMFYUI_MANAGER_REF: ${COMFYUI_MANAGER_REF:-main}
        COMFYUI_ENABLE_CUDA_TORCH: ${COMFYUI_ENABLE_CUDA_TORCH:-1}
        COMFYUI_TORCH_INDEX_URL: ${COMFYUI_TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu124}
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_COMFYUI_CPUS:-${AGENTIC_LIMIT_UI_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_COMFYUI_MEM:-${AGENTIC_LIMIT_UI_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    gpus: all
    read_only: true
    tmpfs:
      - /tmp
    environment:
      AGENTIC_PROFILE: ${AGENTIC_PROFILE:-strict-prod}
      AGENTIC_GPU_PROFILE: lowprio
      AGENTIC_GIT_FORGE_BASE_URL: http://optional-forgejo:3000
      AGENTIC_GIT_FORGE_SHARED_NAMESPACE: ${GIT_FORGE_SHARED_NAMESPACE:-agentic}
      HOME: /comfyui/user
      XDG_CONFIG_HOME: /comfyui/user/.config
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,optional-forgejo,unbound,egress-proxy,localhost,127.0.0.1
      XDG_CACHE_HOME: /tmp/.cache
      HF_HOME: /tmp/.cache/huggingface
    labels:
      - agentic.gpu-profile=lowprio
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/comfyui:/comfyui
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/git-forge/comfyui.password:/run/secrets/git-forge.password:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/ssh/comfyui:/comfyui/user/.ssh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          r=urllib.request.urlopen("http://127.0.0.1:8188/system_stats", timeout=5);
          sys.exit(0 if r.status in (200,302,401,403) else 1)'
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 40s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - agentic

  comfyui-loopback:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_COMFYUI_LOOPBACK_CPUS:-${AGENTIC_LIMIT_UI_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_COMFYUI_LOOPBACK_MEM:-${AGENTIC_LIMIT_UI_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      comfyui:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /tmp/client_temp /tmp/proxy_temp /tmp/fastcgi_temp /tmp/uwsgi_temp /tmp/scgi_temp
        cat >/tmp/nginx.conf <<'NGINX'
        pid /tmp/nginx.pid;
        events {}
        http {
          map $$http_upgrade $$connection_upgrade {
            default upgrade;
            '' close;
          }
          client_body_temp_path /tmp/client_temp;
          proxy_temp_path /tmp/proxy_temp;
          fastcgi_temp_path /tmp/fastcgi_temp;
          uwsgi_temp_path /tmp/uwsgi_temp;
          scgi_temp_path /tmp/scgi_temp;
          server {
            listen 8188;
            location / {
              proxy_pass http://comfyui:8188;
              proxy_http_version 1.1;
              proxy_set_header Host comfyui;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection $$connection_upgrade;
              proxy_read_timeout 3600s;
              proxy_send_timeout 3600s;
              proxy_buffering off;
            }
          }
        }
        NGINX
        exec nginx -g 'daemon off;' -c /tmp/nginx.conf
    ports:
      - 127.0.0.1:${COMFYUI_HOST_PORT:-8188}:8188
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O- http://127.0.0.1:8188/ >/dev/null
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 15s
    networks:
      - agentic
      - agentic-egress

networks:
  agentic:
    external: true
    name: ${AGENTIC_NETWORK:?AGENTIC_NETWORK must be set (use ./agent or source scripts/lib/runtime.sh)}
  agentic-egress:
    external: true
    name: ${AGENTIC_EGRESS_NETWORK:?AGENTIC_EGRESS_NETWORK must be set (use ./agent or source scripts/lib/runtime.sh)}

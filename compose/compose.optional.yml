services:
  optional-sentinel:
    image: alpine:3.20
    profiles:
      - optional
    command:
      - /bin/sh
      - -lc
      - sleep infinity
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD-SHELL
        - test -r /etc/alpine-release
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

  optional-clawdbot:
    image: agentic/optional-modules:local
    build:
      context: ..
      dockerfile: deployments/optional/Dockerfile
    profiles:
      - optional-clawdbot
    command:
      - clawdbot
    restart: unless-stopped
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OPTIONAL_BIND_HOST: 0.0.0.0
      OPTIONAL_BIND_PORT: 8111
      AUDIT_LOG_PATH: /logs/audit.jsonl
      CLAWDBOT_AUTH_TOKEN_FILE: /run/secrets/clawdbot.token
      CLAWDBOT_DM_ALLOWLIST_FILE: /config/dm_allowlist.txt
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,unbound,egress-proxy,localhost,127.0.0.1
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/clawdbot/config:/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/clawdbot/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/clawdbot/logs:/logs
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/clawdbot.token:/run/secrets/clawdbot.token:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8111/healthz", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

  optional-mcp-catalog:
    image: agentic/optional-modules:local
    build:
      context: ..
      dockerfile: deployments/optional/Dockerfile
    profiles:
      - optional-mcp
    command:
      - mcp
    restart: unless-stopped
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OPTIONAL_BIND_HOST: 0.0.0.0
      OPTIONAL_BIND_PORT: 8122
      AUDIT_LOG_PATH: /logs/audit.jsonl
      MCP_AUTH_TOKEN_FILE: /run/secrets/mcp.token
      MCP_ALLOWLIST_FILE: /config/tool_allowlist.txt
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,unbound,egress-proxy,localhost,127.0.0.1
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/mcp/config:/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/mcp/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/mcp/logs:/logs
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/mcp.token:/run/secrets/mcp.token:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8122/healthz", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

  optional-portainer:
    image: portainer/portainer-ce:latest
    profiles:
      - optional-portainer
    command:
      - --http-enabled
      - --http-bind
      - ":9000"
    restart: unless-stopped
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - 127.0.0.1:${PORTAINER_HOST_PORT:-9001}:9000
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/portainer/data:/data
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/portainer/logs:/logs
    networks:
      - agentic

networks:
  agentic:
    external: true
    name: ${AGENTIC_NETWORK:-agentic}

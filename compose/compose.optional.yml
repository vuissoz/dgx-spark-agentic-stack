services:
  optional-sentinel:
    image: alpine:3.20
    profiles:
      - optional
    command:
      - /bin/sh
      - -lc
      - sleep infinity
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPTIONAL_SENTINEL_CPUS:-${AGENTIC_LIMIT_OPTIONAL_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPTIONAL_SENTINEL_MEM:-${AGENTIC_LIMIT_OPTIONAL_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD-SHELL
        - test -r /etc/alpine-release
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

  optional-openclaw:
    image: agentic/optional-modules:local
    build:
      context: ..
      dockerfile: deployments/optional/Dockerfile
      args:
        OPENCLAW_INSTALL_CLI_SCRIPT: ${AGENTIC_OPENCLAW_INSTALL_CLI_SCRIPT:-https://openclaw.ai/install-cli.sh}
        OPENCLAW_INSTALL_VERSION: ${AGENTIC_OPENCLAW_INSTALL_VERSION:-latest}
    profiles:
      - optional-openclaw
    command:
      - openclaw
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPTIONAL_OPENCLAW_CPUS:-${AGENTIC_LIMIT_OPTIONAL_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPTIONAL_OPENCLAW_MEM:-${AGENTIC_LIMIT_OPTIONAL_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OPTIONAL_BIND_HOST: 0.0.0.0
      OPTIONAL_BIND_PORT: 8111
      AUDIT_LOG_PATH: /logs/audit.jsonl
      OPENCLAW_AUTH_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_DM_ALLOWLIST_FILE: /config/dm_allowlist.txt
      OPENCLAW_TOOL_ALLOWLIST_FILE: /config/tool_allowlist.txt
      OPENCLAW_WEBHOOK_SECRET_FILE: /run/secrets/openclaw.webhook_secret
      OPENCLAW_PROFILE_FILE: /config/integration-profile.current.json
      OPENCLAW_SANDBOX_URL: http://optional-openclaw-sandbox:8112
      OPENCLAW_SANDBOX_TIMEOUT_SEC: 3
      OPENCLAW_SANDBOX_AUTH_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_DASHBOARD_ENABLED: "1"
      OPENCLAW_RELAY_STATUS_URL: http://optional-openclaw-relay:8113/v1/queue/status
      HOME: /state/cli/openclaw-home
      OPENCLAW_HOME: /state/cli/openclaw-home
      OPENCLAW_CONFIG_PATH: /state/cli/openclaw-home/openclaw.json
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,unbound,egress-proxy,optional-openclaw,optional-openclaw-sandbox,optional-openclaw-relay,localhost,127.0.0.1
    depends_on:
      optional-openclaw-sandbox:
        condition: service_healthy
    ports:
      - 127.0.0.1:${OPENCLAW_WEBHOOK_HOST_PORT:-18111}:8111
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/config:/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/logs:/logs
      - ${AGENTIC_OPENCLAW_WORKSPACES_DIR:-${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/workspaces}:/workspace
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.token:/run/secrets/openclaw.token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.webhook_secret:/run/secrets/openclaw.webhook_secret:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8111/healthz", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic
      - agentic-egress

  optional-openclaw-gateway:
    image: agentic/optional-modules:local
    build:
      context: ..
      dockerfile: deployments/optional/Dockerfile
      args:
        OPENCLAW_INSTALL_CLI_SCRIPT: ${AGENTIC_OPENCLAW_INSTALL_CLI_SCRIPT:-https://openclaw.ai/install-cli.sh}
        OPENCLAW_INSTALL_VERSION: ${AGENTIC_OPENCLAW_INSTALL_VERSION:-latest}
    profiles:
      - optional-openclaw
    entrypoint:
      - /app/openclaw_gateway_entrypoint.sh
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPTIONAL_OPENCLAW_GATEWAY_CPUS:-${AGENTIC_LIMIT_OPTIONAL_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPTIONAL_OPENCLAW_GATEWAY_MEM:-${AGENTIC_LIMIT_OPTIONAL_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OPENCLAW_GATEWAY_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_GATEWAY_PORT: 18789
      OPENCLAW_GATEWAY_PROXY_PORT: 8114
      OPENCLAW_GATEWAY_AUTH_MODE: token
      OPENCLAW_GATEWAY_BIND_MODE: loopback
      OPENCLAW_GATEWAY_TAILSCALE_MODE: off
      HOME: /state/cli/openclaw-home
      OPENCLAW_HOME: /state/cli/openclaw-home
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,unbound,egress-proxy,optional-openclaw,optional-openclaw-gateway,optional-openclaw-sandbox,optional-openclaw-relay,localhost,127.0.0.1
    depends_on:
      optional-openclaw:
        condition: service_healthy
    ports:
      - 127.0.0.1:${OPENCLAW_GATEWAY_HOST_PORT:-18789}:8114
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/logs:/logs
      - ${AGENTIC_OPENCLAW_WORKSPACES_DIR:-${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/workspaces}:/workspace
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.token:/run/secrets/openclaw.token:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8114/", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - agentic
      - agentic-egress

  optional-openclaw-sandbox:
    image: agentic/optional-modules:local
    build:
      context: ..
      dockerfile: deployments/optional/Dockerfile
      args:
        OPENCLAW_INSTALL_CLI_SCRIPT: ${AGENTIC_OPENCLAW_INSTALL_CLI_SCRIPT:-https://openclaw.ai/install-cli.sh}
        OPENCLAW_INSTALL_VERSION: ${AGENTIC_OPENCLAW_INSTALL_VERSION:-latest}
    profiles:
      - optional-openclaw
    command:
      - openclaw-sandbox
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPTIONAL_OPENCLAW_SANDBOX_CPUS:-${AGENTIC_LIMIT_OPTIONAL_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPTIONAL_OPENCLAW_SANDBOX_MEM:-${AGENTIC_LIMIT_OPTIONAL_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OPTIONAL_BIND_HOST: 0.0.0.0
      OPTIONAL_BIND_PORT: 8112
      AUDIT_LOG_PATH: /logs/audit.jsonl
      OPENCLAW_SANDBOX_AUTH_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_SANDBOX_TOOL_ALLOWLIST_FILE: /config/tool_allowlist.txt
      OPENCLAW_SANDBOX_PROFILE_FILE: /config/integration-profile.current.json
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,unbound,egress-proxy,optional-openclaw,optional-openclaw-sandbox,localhost,127.0.0.1
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/config:/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/sandbox/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/logs:/logs
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.token:/run/secrets/openclaw.token:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8112/healthz", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

  optional-openclaw-relay:
    image: agentic/optional-modules:local
    build:
      context: ..
      dockerfile: deployments/optional/Dockerfile
      args:
        OPENCLAW_INSTALL_CLI_SCRIPT: ${AGENTIC_OPENCLAW_INSTALL_CLI_SCRIPT:-https://openclaw.ai/install-cli.sh}
        OPENCLAW_INSTALL_VERSION: ${AGENTIC_OPENCLAW_INSTALL_VERSION:-latest}
    profiles:
      - optional-openclaw
    command:
      - openclaw-relay
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPTIONAL_OPENCLAW_RELAY_CPUS:-${AGENTIC_LIMIT_OPTIONAL_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPTIONAL_OPENCLAW_RELAY_MEM:-${AGENTIC_LIMIT_OPTIONAL_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OPTIONAL_BIND_HOST: 0.0.0.0
      OPTIONAL_BIND_PORT: 8113
      AUDIT_LOG_PATH: /logs/relay-audit.jsonl
      OPENCLAW_RELAY_PROVIDER_TARGETS_FILE: /config/relay_targets.json
      OPENCLAW_RELAY_TELEGRAM_SECRET_FILE: /run/secrets/openclaw.relay.telegram.secret
      OPENCLAW_RELAY_WHATSAPP_SECRET_FILE: /run/secrets/openclaw.relay.whatsapp.secret
      OPENCLAW_RELAY_FORWARD_URL: http://optional-openclaw:8111/v1/webhooks/dm
      OPENCLAW_RELAY_OPENCLAW_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_RELAY_OPENCLAW_WEBHOOK_SECRET_FILE: /run/secrets/openclaw.webhook_secret
      OPENCLAW_RELAY_FORWARD_TIMEOUT_SEC: ${OPENCLAW_RELAY_FORWARD_TIMEOUT_SEC:-4}
      OPENCLAW_RELAY_MAX_ATTEMPTS: ${OPENCLAW_RELAY_MAX_ATTEMPTS:-10}
      OPENCLAW_RELAY_RETRY_BASE_SEC: ${OPENCLAW_RELAY_RETRY_BASE_SEC:-2}
      OPENCLAW_RELAY_RETRY_MAX_SEC: ${OPENCLAW_RELAY_RETRY_MAX_SEC:-120}
      OPENCLAW_RELAY_POLL_INTERVAL_SEC: ${OPENCLAW_RELAY_POLL_INTERVAL_SEC:-1.5}
      OPENCLAW_RELAY_SIGNATURE_HEADER: ${OPENCLAW_RELAY_SIGNATURE_HEADER:-X-Relay-Signature}
      OPENCLAW_RELAY_TIMESTAMP_HEADER: ${OPENCLAW_RELAY_TIMESTAMP_HEADER:-X-Relay-Timestamp}
      OPENCLAW_RELAY_EVENT_ID_HEADER: ${OPENCLAW_RELAY_EVENT_ID_HEADER:-X-Provider-Event-ID}
      OPENCLAW_RELAY_MAX_SKEW_SEC: ${OPENCLAW_RELAY_MAX_SKEW_SEC:-300}
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,unbound,egress-proxy,optional-openclaw,optional-openclaw-relay,localhost,127.0.0.1
    depends_on:
      optional-openclaw:
        condition: service_healthy
    ports:
      - 127.0.0.1:${OPENCLAW_RELAY_HOST_PORT:-18112}:8113
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/config:/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/relay/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/openclaw/relay/logs:/logs
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.token:/run/secrets/openclaw.token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.webhook_secret:/run/secrets/openclaw.webhook_secret:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.relay.telegram.secret:/run/secrets/openclaw.relay.telegram.secret:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.relay.whatsapp.secret:/run/secrets/openclaw.relay.whatsapp.secret:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8113/healthz", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

  optional-mcp-catalog:
    image: agentic/optional-modules:local
    build:
      context: ..
      dockerfile: deployments/optional/Dockerfile
      args:
        OPENCLAW_INSTALL_CLI_SCRIPT: ${AGENTIC_OPENCLAW_INSTALL_CLI_SCRIPT:-https://openclaw.ai/install-cli.sh}
        OPENCLAW_INSTALL_VERSION: ${AGENTIC_OPENCLAW_INSTALL_VERSION:-latest}
    profiles:
      - optional-mcp
    command:
      - mcp
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPTIONAL_MCP_CATALOG_CPUS:-${AGENTIC_LIMIT_OPTIONAL_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPTIONAL_MCP_CATALOG_MEM:-${AGENTIC_LIMIT_OPTIONAL_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OPTIONAL_BIND_HOST: 0.0.0.0
      OPTIONAL_BIND_PORT: 8122
      AUDIT_LOG_PATH: /logs/audit.jsonl
      MCP_AUTH_TOKEN_FILE: /run/secrets/mcp.token
      MCP_ALLOWLIST_FILE: /config/tool_allowlist.txt
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,unbound,egress-proxy,localhost,127.0.0.1
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/mcp/config:/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/mcp/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/mcp/logs:/logs
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/mcp.token:/run/secrets/mcp.token:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8122/healthz", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

  optional-pi-mono:
    image: agentic/agent-cli-base:local
    build:
      context: ..
      dockerfile: deployments/images/agent-cli-base/Dockerfile
      args:
        AGENT_CLI_INSTALL_MODE: ${AGENTIC_AGENT_CLI_INSTALL_MODE:-best-effort}
        CODEX_CLI_NPM_SPEC: ${AGENTIC_CODEX_CLI_NPM_SPEC:-@openai/codex@latest}
        CLAUDE_CODE_NPM_SPEC: ${AGENTIC_CLAUDE_CODE_NPM_SPEC:-@anthropic-ai/claude-code@latest}
        OPENCODE_NPM_SPEC: ${AGENTIC_OPENCODE_NPM_SPEC:-opencode-ai@latest}
        PI_CODING_AGENT_NPM_SPEC: ${AGENTIC_PI_CODING_AGENT_NPM_SPEC:-@mariozechner/pi-coding-agent@latest}
        OPENHANDS_INSTALL_SCRIPT: ${AGENTIC_OPENHANDS_INSTALL_SCRIPT:-https://install.openhands.dev/install.sh}
        OPENCLAW_INSTALL_CLI_SCRIPT: ${AGENTIC_OPENCLAW_INSTALL_CLI_SCRIPT:-https://openclaw.ai/install-cli.sh}
        OPENCLAW_INSTALL_VERSION: ${AGENTIC_OPENCLAW_INSTALL_VERSION:-latest}
        VIBE_INSTALL_SCRIPT: ${AGENTIC_VIBE_INSTALL_SCRIPT:-https://mistral.ai/vibe/install.sh}
    profiles:
      - optional-pi-mono
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPTIONAL_PI_MONO_CPUS:-${AGENTIC_LIMIT_OPTIONAL_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPTIONAL_PI_MONO_MEM:-${AGENTIC_LIMIT_OPTIONAL_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    init: true
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      AGENT_TOOL: pi-mono
      AGENT_PRIMARY_CLI: pi
      AGENT_SESSION: pi-mono
      AGENT_HOME: /state/home
      AGENT_WORKSPACE: /workspace
      AGENT_STATE_DIR: /state
      AGENT_LOGS_DIR: /logs
      HOME: /state/home
      XDG_CONFIG_HOME: /state/home/.config
      XDG_CACHE_HOME: /state/home/.cache
      OLLAMA_BASE_URL: http://ollama-gate:11435
      OPENAI_BASE_URL: http://ollama-gate:11435/v1
      OPENAI_API_BASE_URL: http://ollama-gate:11435/v1
      OPENAI_API_BASE: http://ollama-gate:11435/v1
      OPENAI_API_KEY: ollama
      ANTHROPIC_AUTH_TOKEN: ollama
      ANTHROPIC_API_KEY: ollama
      GATE_MCP_URL: http://gate-mcp:8123
      GATE_MCP_AUTH_TOKEN_FILE: /run/secrets/gate_mcp.token
      AGENTIC_DEFAULT_MODEL: ${AGENTIC_DEFAULT_MODEL:-qwen3-coder:30b}
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,gate-mcp,unbound,egress-proxy,localhost,127.0.0.1
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/pi-mono/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/pi-mono/logs:/logs
      - ${AGENTIC_PI_MONO_WORKSPACES_DIR:-${AGENTIC_ROOT:-/srv/agentic}/optional/pi-mono/workspaces}:/workspace
      - ${AGENTIC_ROOT:-/srv/agentic}/shared-ro:/shared-ro:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/shared-rw:/shared-rw
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/gate_mcp.token:/run/secrets/gate_mcp.token:ro
    healthcheck:
      test:
        - CMD-SHELL
        - tmux has-session -t pi-mono
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - agentic

  optional-goose:
    image: ghcr.io/block/goose:latest
    profiles:
      - optional-goose
    init: true
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    working_dir: /workspace
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        set -eu
        mkdir -p \
          /workspace \
          /logs \
          /state/home/.config/goose \
          /state/home/.cache \
          /state/home/.local/share/goose/sessions \
          /state/home/.local/state/goose/logs
        if [ -f /state/config.yaml ] && [ ! -f /state/home/.config/goose/config.yaml ]; then
          cp -a /state/config.yaml /state/home/.config/goose/config.yaml
        fi
        sleep infinity
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPTIONAL_GOOSE_CPUS:-${AGENTIC_LIMIT_OPTIONAL_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPTIONAL_GOOSE_MEM:-${AGENTIC_LIMIT_OPTIONAL_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /state/home
      XDG_CONFIG_HOME: /state/home/.config
      XDG_CACHE_HOME: /state/home/.cache
      XDG_DATA_HOME: /state/home/.local/share
      XDG_STATE_HOME: /state/home/.local/state
      GOOSE_PROVIDER: ${AGENTIC_GOOSE_PROVIDER:-ollama}
      GOOSE_MODEL: ${AGENTIC_GOOSE_MODEL:-${AGENTIC_DEFAULT_MODEL:-qwen3-coder:30b}}
      GOOSE_CONTEXT_LIMIT: ${AGENTIC_GOOSE_CONTEXT_LIMIT:-${AGENTIC_DEFAULT_MODEL_CONTEXT_WINDOW:-262144}}
      OLLAMA_HOST: http://ollama-gate:11435
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,unbound,egress-proxy,localhost,127.0.0.1
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/goose/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/goose/logs:/logs
      - ${AGENTIC_GOOSE_WORKSPACES_DIR:-${AGENTIC_ROOT:-/srv/agentic}/optional/goose/workspaces}:/workspace
      - ${AGENTIC_ROOT:-/srv/agentic}/shared-ro:/shared-ro:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/shared-rw:/shared-rw
    healthcheck:
      test:
        - CMD-SHELL
        - goose session list >/dev/null 2>&1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - agentic

  optional-portainer:
    image: portainer/portainer-ce:latest
    profiles:
      - optional-portainer
    command:
      - --http-enabled
      - --bind
      - ":9000"
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPTIONAL_PORTAINER_CPUS:-${AGENTIC_LIMIT_OPTIONAL_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPTIONAL_PORTAINER_MEM:-${AGENTIC_LIMIT_OPTIONAL_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - 127.0.0.1:${PORTAINER_HOST_PORT:-9001}:9000
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/portainer/data:/data
      - ${AGENTIC_ROOT:-/srv/agentic}/optional/portainer/logs:/logs
    healthcheck:
      test:
        - CMD
        - /portainer
        - --version
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - agentic
      - agentic-egress

networks:
  agentic:
    external: true
    name: ${AGENTIC_NETWORK:-agentic}
  agentic-egress:
    external: true
    name: ${AGENTIC_EGRESS_NETWORK:-agentic-egress}

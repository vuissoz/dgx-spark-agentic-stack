services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_QDRANT_CPUS:-${AGENTIC_LIMIT_RAG_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_QDRANT_MEM:-${AGENTIC_LIMIT_RAG_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${QDRANT_CONTAINER_USER:-${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}}"
    environment:
      QDRANT_INIT_FILE_PATH: /qdrant/storage/.qdrant-initialized
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/rag/qdrant:/qdrant/storage
      - ${AGENTIC_ROOT:-/srv/agentic}/rag/qdrant-snapshots:/qdrant/snapshots
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333 &&
          printf "GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 &&
          grep -q "200 OK" <&3'
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks:
      - agentic

  rag-retriever:
    image: python:3.12-alpine
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_RAG_RETRIEVER_CPUS:-${AGENTIC_LIMIT_RAG_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_RAG_RETRIEVER_MEM:-${AGENTIC_LIMIT_RAG_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - python
      - /app/retriever_api.py
    environment:
      RAG_RETRIEVER_HOST: 0.0.0.0
      RAG_RETRIEVER_PORT: "7111"
      RAG_SCHEMA_PATH: /config/document.schema.json
      RAG_RETRIEVER_STATE_DIR: /state
      RAG_RETRIEVER_LOG_DIR: /logs
      RAG_QDRANT_URL: http://qdrant:6333
      RAG_GATE_URL: http://ollama-gate:11435
      RAG_OPENSEARCH_URL: http://opensearch:9200
      RAG_COLLECTION: ${RAG_COLLECTION:-agentic_docs}
      RAG_LEXICAL_INDEX: ${RAG_LEXICAL_INDEX:-agentic_docs}
      RAG_EMBED_MODEL: ${RAG_EMBED_MODEL:-qwen3-embedding:0.6b}
      RAG_GATE_DRY_RUN: ${RAG_GATE_DRY_RUN:-1}
      RAG_DENSE_BACKEND: qdrant
      RAG_LEXICAL_BACKEND: ${RAG_LEXICAL_BACKEND:-disabled}
      RAG_FUSION_METHOD: ${RAG_FUSION_METHOD:-rrf}
      RAG_RRF_K: ${RAG_RRF_K:-60}
      RAG_RERANK_ENABLED: ${RAG_RERANK_ENABLED:-0}
      RAG_RERANK_BACKEND: ${RAG_RERANK_BACKEND:-lexical}
      RAG_RERANK_MODEL: ${RAG_RERANK_MODEL:-lexical-token-overlap-v1}
      RAG_RERANK_CANDIDATES: ${RAG_RERANK_CANDIDATES:-16}
      RAG_RERANK_TOP_N: ${RAG_RERANK_TOP_N:-8}
    volumes:
      - ../deployments/rag/retriever_api.py:/app/retriever_api.py:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/rag/config:/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/rag/retriever/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/rag/retriever/logs:/logs
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:7111/healthz", timeout=3).read()
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 15s
    networks:
      - agentic

  rag-worker:
    image: python:3.12-alpine
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_RAG_WORKER_CPUS:-${AGENTIC_LIMIT_RAG_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_RAG_WORKER_MEM:-${AGENTIC_LIMIT_RAG_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - python
      - /app/rag_worker.py
    environment:
      RAG_WORKER_HOST: 0.0.0.0
      RAG_WORKER_PORT: "7112"
      RAG_WORKER_STATE_DIR: /state
      RAG_WORKER_LOG_DIR: /logs
      RAG_WORKER_DOCS_DIR: /docs
      RAG_RETRIEVER_URL: http://rag-retriever:7111
      RAG_QDRANT_URL: http://qdrant:6333
      RAG_GATE_URL: http://ollama-gate:11435
      RAG_OPENSEARCH_URL: http://opensearch:9200
      RAG_COLLECTION: ${RAG_COLLECTION:-agentic_docs}
      RAG_LEXICAL_INDEX: ${RAG_LEXICAL_INDEX:-agentic_docs}
      RAG_EMBED_MODEL: ${RAG_EMBED_MODEL:-qwen3-embedding:0.6b}
      RAG_GATE_DRY_RUN: ${RAG_GATE_DRY_RUN:-1}
      RAG_LEXICAL_BACKEND: ${RAG_LEXICAL_BACKEND:-disabled}
      RAG_OPENSEARCH_BOOTSTRAP: ${RAG_OPENSEARCH_BOOTSTRAP:-1}
      RAG_OPENSEARCH_BOOTSTRAP_TIMEOUT_SEC: ${RAG_OPENSEARCH_BOOTSTRAP_TIMEOUT_SEC:-60}
      RAG_WORKER_BOOTSTRAP_INDEX: ${RAG_WORKER_BOOTSTRAP_INDEX:-1}
      RAG_WORKER_POLL_INTERVAL_SEC: "10"
    volumes:
      - ../deployments/rag/rag_worker.py:/app/rag_worker.py:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/rag/worker/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/rag/worker/logs:/logs
      - ${AGENTIC_ROOT:-/srv/agentic}/rag/docs:/docs:ro
    depends_on:
      rag-retriever:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:7112/healthz", timeout=3).read()
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 15s
    networks:
      - agentic

  opensearch:
    image: opensearchproject/opensearch:latest
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPENSEARCH_CPUS:-${AGENTIC_LIMIT_RAG_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPENSEARCH_MEM:-${AGENTIC_LIMIT_RAG_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    profiles:
      - rag-lexical
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      bootstrap.memory_lock: "false"
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/rag/opensearch:/usr/share/opensearch/data
      - ${AGENTIC_ROOT:-/srv/agentic}/rag/opensearch-logs:/usr/share/opensearch/logs
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -lc 'exec 3<>/dev/tcp/127.0.0.1/9200 &&
          printf "GET /_cluster/health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 &&
          grep -q "200 OK" <&3'
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    networks:
      - agentic

networks:
  agentic:
    name: ${AGENTIC_NETWORK:-agentic}
    driver: bridge
    internal: true

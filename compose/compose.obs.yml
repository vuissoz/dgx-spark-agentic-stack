services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    user: "${PROMETHEUS_CONTAINER_USER:-0:0}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - 127.0.0.1:${PROMETHEUS_HOST_PORT:-19090}:9090
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/config/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/prometheus:/prometheus
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O- http://127.0.0.1:9090/-/healthy | grep -qi 'prometheus'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - agentic
      - agentic-egress

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    user: "${GRAFANA_CONTAINER_USER:-472:472}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - 127.0.0.1:${GRAFANA_HOST_PORT:-13000}:3000
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_ADDR: 0.0.0.0
      GF_SERVER_HTTP_PORT: "3000"
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/grafana:/var/lib/grafana
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O- http://127.0.0.1:3000/api/health | grep -Eq '"database"[[:space:]]*:[[:space:]]*"ok"'
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 30s
    networks:
      - agentic
      - agentic-egress

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    user: "${LOKI_CONTAINER_USER:-0:0}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - -config.file=/etc/loki/loki-config.yml
    ports:
      - 127.0.0.1:${LOKI_HOST_PORT:-13100}:3100
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/config/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/loki:/loki
    healthcheck:
      test:
        - CMD
        - /usr/bin/loki
        - -version
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 25s
    networks:
      - agentic
      - agentic-egress

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    user: "${PROMTAIL_CONTAINER_USER:-0:0}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/config/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/promtail/positions:/promtail/positions
      - ${AGENTIC_ROOT:-/srv/agentic}/proxy/logs:/tmp/agentic-proxy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
    healthcheck:
      test:
        - CMD
        - /usr/bin/promtail
        - --version
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks:
      - agentic

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - agentic

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
    volumes:
      - /:/rootfs:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /sys:/sys:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - agentic

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    restart: unless-stopped
    gpus: all
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - agentic

networks:
  agentic:
    external: true
    name: ${AGENTIC_NETWORK:-agentic}
  agentic-egress:
    external: true
    name: ${AGENTIC_EGRESS_NETWORK:-agentic-egress}

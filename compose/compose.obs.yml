services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_PROMETHEUS_CPUS:-${AGENTIC_LIMIT_OBS_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_PROMETHEUS_MEM:-${AGENTIC_LIMIT_OBS_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${PROMETHEUS_CONTAINER_USER:-${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-${AGENTIC_OBS_RETENTION_TIME:-7d}}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-2GB}
      - --web.enable-lifecycle
    environment:
      PROMETHEUS_RETENTION_TIME: ${PROMETHEUS_RETENTION_TIME:-${AGENTIC_OBS_RETENTION_TIME:-7d}}
      PROMETHEUS_RETENTION_SIZE: ${PROMETHEUS_RETENTION_SIZE:-2GB}
    ports:
      - 127.0.0.1:${PROMETHEUS_HOST_PORT:-19090}:9090
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/config/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/prometheus:/prometheus
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O- http://127.0.0.1:9090/-/healthy | grep -qi 'prometheus'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - agentic
      - agentic-egress

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_GRAFANA_CPUS:-${AGENTIC_LIMIT_OBS_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_GRAFANA_MEM:-${AGENTIC_LIMIT_OBS_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${GRAFANA_CONTAINER_USER:-472:472}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - 127.0.0.1:${GRAFANA_HOST_PORT:-13000}:3000
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_ADDR: 0.0.0.0
      GF_SERVER_HTTP_PORT: "3000"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/agentic-activity-overview.json
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/grafana:/var/lib/grafana
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/config/grafana/dashboards:/etc/grafana/dashboards:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O- http://127.0.0.1:3000/api/health | grep -Eq '"database"[[:space:]]*:[[:space:]]*"ok"'
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 30s
    networks:
      - agentic
      - agentic-egress

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_LOKI_CPUS:-${AGENTIC_LIMIT_OBS_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_LOKI_MEM:-${AGENTIC_LIMIT_OBS_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${LOKI_CONTAINER_USER:-${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - -config.file=/etc/loki/loki-config.yml
    environment:
      LOKI_RETENTION_PERIOD: ${LOKI_RETENTION_PERIOD:-${AGENTIC_OBS_RETENTION_TIME:-7d}}
      LOKI_MAX_QUERY_LOOKBACK: ${LOKI_MAX_QUERY_LOOKBACK:-${AGENTIC_OBS_RETENTION_TIME:-7d}}
      AGENTIC_LOKI_DISK_BUDGET: ${AGENTIC_LOKI_DISK_BUDGET:-6GB}
    ports:
      - 127.0.0.1:${LOKI_HOST_PORT:-13100}:3100
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/config/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/loki:/loki
    healthcheck:
      test:
        - CMD
        - /usr/bin/loki
        - -version
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 25s
    networks:
      - agentic
      - agentic-egress

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_PROMTAIL_CPUS:-${AGENTIC_LIMIT_OBS_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_PROMTAIL_MEM:-${AGENTIC_LIMIT_OBS_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${PROMTAIL_CONTAINER_USER:-0:0}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/config/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/monitoring/promtail/positions:/promtail/positions
      - ${AGENTIC_ROOT:-/srv/agentic}/proxy/logs:/tmp/agentic-proxy:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/gate/logs:/tmp/agentic-gate:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/gate/mcp/logs:/tmp/agentic-gate-mcp:ro
      - ${PROMTAIL_DOCKER_CONTAINERS_HOST_PATH:-/var/lib/docker/containers}:/var/lib/docker/containers:ro
      - ${PROMTAIL_HOST_LOG_PATH:-/var/log}:/var/log:ro
    healthcheck:
      test:
        - CMD
        - /usr/bin/promtail
        - --version
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks:
      - agentic

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_NODE_EXPORTER_CPUS:-${AGENTIC_LIMIT_OBS_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_NODE_EXPORTER_MEM:-${AGENTIC_LIMIT_OBS_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - --path.rootfs=/host
    volumes:
      - ${NODE_EXPORTER_HOST_ROOT_PATH:-/}:/host:ro,rslave
    healthcheck:
      test:
        - CMD
        - /bin/node_exporter
        - --version
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_CADVISOR_CPUS:-${AGENTIC_LIMIT_OBS_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_CADVISOR_MEM:-${AGENTIC_LIMIT_OBS_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    # Explicit root exception: host-level cgroup/fs metrics require root privileges.
    user: "0:0"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
    volumes:
      - ${CADVISOR_HOST_ROOT_PATH:-/}:/rootfs:ro
      - ${CADVISOR_DOCKER_LIB_HOST_PATH:-/var/lib/docker}:/var/lib/docker:ro
      - ${CADVISOR_SYS_HOST_PATH:-/sys}:/sys:ro
      - ${CADVISOR_DEV_DISK_HOST_PATH:-/dev/disk}:/dev/disk:ro
    healthcheck:
      test:
        - CMD
        - /usr/bin/cadvisor
        - --version
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_DCGM_EXPORTER_CPUS:-${AGENTIC_LIMIT_OBS_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_DCGM_EXPORTER_MEM:-${AGENTIC_LIMIT_OBS_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    gpus: all
    # Explicit root exception: NVIDIA device and driver telemetry access.
    user: "0:0"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - /usr/bin/dcgm-exporter
        - --version
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

networks:
  agentic:
    external: true
    name: ${AGENTIC_NETWORK:?AGENTIC_NETWORK must be set (use ./agent or source scripts/lib/runtime.sh)}
  agentic-egress:
    external: true
    name: ${AGENTIC_EGRESS_NETWORK:?AGENTIC_EGRESS_NETWORK must be set (use ./agent or source scripts/lib/runtime.sh)}

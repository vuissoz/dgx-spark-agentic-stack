services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OLLAMA_CPUS:-${AGENTIC_LIMIT_CORE_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OLLAMA_MEM:-${AGENTIC_LIMIT_CORE_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    gpus: all
    user: "${OLLAMA_CONTAINER_USER:-0:0}"
    ports:
      - 127.0.0.1:${OLLAMA_HOST_PORT:-11434}:11434
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_MODELS: ${OLLAMA_CONTAINER_MODELS_PATH:-/root/.ollama/models}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-262144}
      NVIDIA_VISIBLE_DEVICES: ${OLLAMA_NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${OLLAMA_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - ${OLLAMA_MODELS_DIR:-${AGENTIC_ROOT:-/srv/agentic}/ollama/models}:${OLLAMA_CONTAINER_MODELS_PATH:-/root/.ollama/models}:${OLLAMA_MODELS_MOUNT_MODE:-rw}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -lc 'exec 3<>/dev/tcp/127.0.0.1/11434 &&
          printf "GET /api/version HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 &&
          grep -q "200 OK" <&3'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      agentic:
        priority: 100
      agentic-egress:
        priority: 1000

  ollama-gate:
    image: agentic/ollama-gate:local
    build:
      context: ..
      dockerfile: deployments/gate/Dockerfile
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OLLAMA_GATE_CPUS:-${AGENTIC_LIMIT_CORE_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OLLAMA_GATE_MEM:-${AGENTIC_LIMIT_CORE_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${GATE_CONTAINER_USER:-${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      GATE_LISTEN_HOST: 0.0.0.0
      GATE_LISTEN_PORT: 11435
      GATE_MODEL_ROUTES_FILE: /gate/config/model_routes.yml
      GATE_CONCURRENCY: 1
      GATE_QUEUE_WAIT_TIMEOUT_SECONDS: 60
      GATE_STATE_DIR: /gate/state
      GATE_STICKY_FILE: /gate/state/sticky_sessions.json
      GATE_MODE_FILE: /gate/state/llm_mode.json
      GATE_BACKEND_FILE: /gate/state/llm_backend.json
      GATE_BACKEND_RUNTIME_FILE: /gate/state/llm_backend_runtime.json
      GATE_QUOTAS_FILE: /gate/state/quotas_state.json
      GATE_LLM_MODE: ${AGENTIC_LLM_MODE:-hybrid}
      GATE_LLM_BACKEND: ${AGENTIC_LLM_BACKEND:-both}
      GATE_LLM_BACKEND_SWITCH_COOLDOWN_SECONDS: ${AGENTIC_LLM_BACKEND_SWITCH_COOLDOWN_SECONDS:-3}
      GATE_LOG_FILE: /gate/logs/gate.jsonl
      GATE_ENABLE_TEST_MODE: ${GATE_ENABLE_TEST_MODE:-0}
      GATE_MAX_TEST_SLEEP_SECONDS: 15
      GATE_OPENAI_API_KEY_FILE: /gate/secrets/openai.api_key
      GATE_OPENROUTER_API_KEY_FILE: /gate/secrets/openrouter.api_key
      GATE_EXTERNAL_OPENAI_DAILY_TOKENS: ${AGENTIC_OPENAI_DAILY_TOKENS:-0}
      GATE_EXTERNAL_OPENAI_MONTHLY_TOKENS: ${AGENTIC_OPENAI_MONTHLY_TOKENS:-0}
      GATE_EXTERNAL_OPENAI_DAILY_REQUESTS: ${AGENTIC_OPENAI_DAILY_REQUESTS:-0}
      GATE_EXTERNAL_OPENAI_MONTHLY_REQUESTS: ${AGENTIC_OPENAI_MONTHLY_REQUESTS:-0}
      GATE_EXTERNAL_OPENROUTER_DAILY_TOKENS: ${AGENTIC_OPENROUTER_DAILY_TOKENS:-0}
      GATE_EXTERNAL_OPENROUTER_MONTHLY_TOKENS: ${AGENTIC_OPENROUTER_MONTHLY_TOKENS:-0}
      GATE_EXTERNAL_OPENROUTER_DAILY_REQUESTS: ${AGENTIC_OPENROUTER_DAILY_REQUESTS:-0}
      GATE_EXTERNAL_OPENROUTER_MONTHLY_REQUESTS: ${AGENTIC_OPENROUTER_MONTHLY_REQUESTS:-0}
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      ALL_PROXY: http://egress-proxy:3128
      NO_PROXY: 127.0.0.1,localhost,ollama,ollama-gate,trtllm,unbound,egress-proxy
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/gate/config:/gate/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/gate/state:/gate/state
      - ${AGENTIC_ROOT:-/srv/agentic}/gate/logs:/gate/logs
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime:/gate/secrets:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:11435/healthz", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - agentic
      - agentic-llm

  gate-mcp:
    image: agentic/gate-mcp:local
    build:
      context: ..
      dockerfile: deployments/gate_mcp/Dockerfile
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_GATE_MCP_CPUS:-${AGENTIC_LIMIT_CORE_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_GATE_MCP_MEM:-${AGENTIC_LIMIT_CORE_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      ollama-gate:
        condition: service_healthy
    environment:
      GATE_MCP_BIND_HOST: 0.0.0.0
      GATE_MCP_BIND_PORT: 8123
      GATE_MCP_GATE_URL: http://ollama-gate:11435
      GATE_MCP_AUTH_TOKEN_FILE: /run/secrets/gate_mcp.token
      GATE_MCP_AUDIT_LOG: /logs/audit.jsonl
      GATE_MCP_RATE_LIMIT_RPS: ${GATE_MCP_RATE_LIMIT_RPS:-5}
      GATE_MCP_RATE_LIMIT_BURST: ${GATE_MCP_RATE_LIMIT_BURST:-10}
      GATE_MCP_HTTP_TIMEOUT_SEC: ${GATE_MCP_HTTP_TIMEOUT_SEC:-5}
      GATE_MCP_ALLOWED_MODEL_REGEX: ${GATE_MCP_ALLOWED_MODEL_REGEX:-}
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/gate/mcp/logs:/logs
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/gate_mcp.token:/run/secrets/gate_mcp.token:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8123/healthz", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

  openclaw:
    image: agentic/optional-modules:local
    build:
      context: ..
      dockerfile: deployments/optional/Dockerfile
      args:
        OPENCLAW_INSTALL_CLI_SCRIPT: ${AGENTIC_OPENCLAW_INSTALL_CLI_SCRIPT:-https://openclaw.ai/install-cli.sh}
        OPENCLAW_INSTALL_VERSION: ${AGENTIC_OPENCLAW_INSTALL_VERSION:-latest}
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPENCLAW_CPUS:-${AGENTIC_LIMIT_CORE_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPENCLAW_MEM:-${AGENTIC_LIMIT_CORE_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - openclaw
    environment:
      OPTIONAL_BIND_HOST: 0.0.0.0
      OPTIONAL_BIND_PORT: 8111
      AUDIT_LOG_PATH: /logs/audit.jsonl
      OPENCLAW_AUTH_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_DM_ALLOWLIST_FILE: /config/dm_allowlist.txt
      OPENCLAW_TOOL_ALLOWLIST_FILE: /config/tool_allowlist.txt
      OPENCLAW_WEBHOOK_SECRET_FILE: /run/secrets/openclaw.webhook_secret
      OPENCLAW_PROFILE_FILE: /config/integration-profile.current.json
      OPENCLAW_OPERATOR_RUNTIME_FILE: /config/operator-runtime.v1.json
      OPENCLAW_MODULE_MANIFEST_FILE: /config/module/openclaw.module-manifest.v1.json
      OPENCLAW_SANDBOX_URL: http://openclaw-sandbox:8112
      OPENCLAW_SANDBOX_LIFECYCLE_URL: http://openclaw-sandbox:8112/v1/internal/sandboxes/lease
      OPENCLAW_SANDBOX_TIMEOUT_SEC: 3
      OPENCLAW_SANDBOX_AUTH_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_SANDBOX_STATUS_URL: http://openclaw-sandbox:8112/v1/sandboxes/status
      OPENCLAW_DASHBOARD_ENABLED: "1"
      OPENCLAW_RELAY_STATUS_URL: http://openclaw-relay:8113/v1/queue/status
      OPENCLAW_APPROVALS_STATE_DIR: /state/approvals
      OPENCLAW_APPROVALS_PENDING_TTL_SEC: ${OPENCLAW_APPROVALS_PENDING_TTL_SEC:-604800}
      OPENCLAW_DEFAULT_MODEL: ${AGENTIC_DEFAULT_MODEL:-qwen3-coder:30b}
      AGENTIC_DEFAULT_MODEL_CONTEXT_WINDOW: ${AGENTIC_DEFAULT_MODEL_CONTEXT_WINDOW:-50909}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-${AGENTIC_DEFAULT_MODEL_CONTEXT_WINDOW:-50909}}
      AGENTIC_CONTEXT_COMPACTION_SOFT_PERCENT: ${AGENTIC_CONTEXT_COMPACTION_SOFT_PERCENT:-75}
      AGENTIC_CONTEXT_COMPACTION_DANGER_PERCENT: ${AGENTIC_CONTEXT_COMPACTION_DANGER_PERCENT:-90}
      AGENTIC_CONTEXT_BUDGET_TOKENS: ${AGENTIC_CONTEXT_BUDGET_TOKENS:-50909}
      AGENTIC_CONTEXT_COMPACTION_SOFT_TOKENS: ${AGENTIC_CONTEXT_COMPACTION_SOFT_TOKENS:-38181}
      AGENTIC_CONTEXT_COMPACTION_DANGER_TOKENS: ${AGENTIC_CONTEXT_COMPACTION_DANGER_TOKENS:-45818}
      HOME: /state/cli/openclaw-home
      OPENCLAW_HOME: /state/cli/openclaw-home
      OPENCLAW_CONFIG_PATH: /tmp/openclaw.effective.json
      OPENCLAW_IMMUTABLE_CONFIG_FILE: /config/immutable/openclaw.stack-config.v1.json
      OPENCLAW_PROVIDER_BRIDGE_FILE: /config/bridge/openclaw.provider-bridge.json
      OPENCLAW_OPERATOR_OVERLAY_FILE: /overlay/openclaw.operator-overlay.json
      OPENCLAW_STATE_CONFIG_FILE: /state/cli/openclaw-home/openclaw.state.json
      OPENCLAW_CONFIG_GATEWAY_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram.bot_token
      OPENCLAW_DISCORD_BOT_TOKEN_FILE: /run/secrets/discord.bot_token
      OPENCLAW_SLACK_BOT_TOKEN_FILE: /run/secrets/slack.bot_token
      OPENCLAW_SLACK_APP_TOKEN_FILE: /run/secrets/slack.app_token
      OPENCLAW_SLACK_SIGNING_SECRET_FILE: /run/secrets/slack.signing_secret
      AGENTIC_GIT_FORGE_BASE_URL: http://optional-forgejo:3000
      AGENTIC_GIT_FORGE_SHARED_NAMESPACE: ${GIT_FORGE_SHARED_NAMESPACE:-agentic}
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,optional-forgejo,unbound,egress-proxy,openclaw,openclaw-sandbox,openclaw-relay,localhost,127.0.0.1
    depends_on:
      openclaw-provider-bridge:
        condition: service_healthy
      openclaw-sandbox:
        condition: service_healthy
    ports:
      - 127.0.0.1:${OPENCLAW_WEBHOOK_HOST_PORT:-18111}:8111
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/config:/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/config/bridge:/config/bridge:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/config/overlay:/overlay
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/logs:/logs
      - ${AGENTIC_OPENCLAW_WORKSPACES_DIR:-${AGENTIC_ROOT:-/srv/agentic}/openclaw/workspaces}:/workspace
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.token:/run/secrets/openclaw.token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.webhook_secret:/run/secrets/openclaw.webhook_secret:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/telegram.bot_token:/run/secrets/telegram.bot_token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/discord.bot_token:/run/secrets/discord.bot_token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/slack.bot_token:/run/secrets/slack.bot_token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/slack.app_token:/run/secrets/slack.app_token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/slack.signing_secret:/run/secrets/slack.signing_secret:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/git-forge/openclaw.password:/run/secrets/git-forge.password:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/ssh/openclaw:/state/cli/openclaw-home/.ssh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8111/healthz", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic
      - agentic-egress

  openclaw-provider-bridge:
    image: agentic/optional-modules:local
    build:
      context: ..
      dockerfile: deployments/optional/Dockerfile
      args:
        OPENCLAW_INSTALL_CLI_SCRIPT: ${AGENTIC_OPENCLAW_INSTALL_CLI_SCRIPT:-https://openclaw.ai/install-cli.sh}
        OPENCLAW_INSTALL_VERSION: ${AGENTIC_OPENCLAW_INSTALL_VERSION:-latest}
    entrypoint:
      - python3
      - /app/openclaw_provider_bridge.py
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPENCLAW_PROVIDER_BRIDGE_CPUS:-${AGENTIC_LIMIT_CORE_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPENCLAW_PROVIDER_BRIDGE_MEM:-${AGENTIC_LIMIT_CORE_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /state/cli/openclaw-home
      OPENCLAW_HOME: /state/cli/openclaw-home
      OPENCLAW_CONFIG_PATH: /tmp/openclaw.effective.json
      OPENCLAW_IMMUTABLE_CONFIG_FILE: /config/immutable/openclaw.stack-config.v1.json
      OPENCLAW_PROVIDER_BRIDGE_FILE: /config/bridge/openclaw.provider-bridge.json
      OPENCLAW_PROVIDER_BRIDGE_STATUS_FILE: /state/provider-bridge-status.json
      OPENCLAW_OPERATOR_OVERLAY_FILE: /overlay/openclaw.operator-overlay.json
      OPENCLAW_STATE_CONFIG_FILE: /state/cli/openclaw-home/openclaw.state.json
      OPENCLAW_CONFIG_GATEWAY_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram.bot_token
      OPENCLAW_DISCORD_BOT_TOKEN_FILE: /run/secrets/discord.bot_token
      OPENCLAW_SLACK_BOT_TOKEN_FILE: /run/secrets/slack.bot_token
      OPENCLAW_SLACK_APP_TOKEN_FILE: /run/secrets/slack.app_token
      OPENCLAW_SLACK_SIGNING_SECRET_FILE: /run/secrets/slack.signing_secret
      OPENCLAW_PROVIDER_BRIDGE_TELEGRAM_TOKEN_FILE: /run/secrets/telegram.bot_token
      OPENCLAW_PROVIDER_BRIDGE_DISCORD_TOKEN_FILE: /run/secrets/discord.bot_token
      OPENCLAW_PROVIDER_BRIDGE_SLACK_BOT_TOKEN_FILE: /run/secrets/slack.bot_token
      OPENCLAW_PROVIDER_BRIDGE_SLACK_APP_TOKEN_FILE: /run/secrets/slack.app_token
      OPENCLAW_PROVIDER_BRIDGE_SLACK_SIGNING_SECRET_FILE: /run/secrets/slack.signing_secret
      OPENCLAW_PROVIDER_BRIDGE_WHATSAPP_ENABLE: ${OPENCLAW_PROVIDER_WHATSAPP_ENABLE:-false}
      OPENCLAW_PROVIDER_BRIDGE_WHATSAPP_PLUGIN_SPEC: ${OPENCLAW_PROVIDER_WHATSAPP_PLUGIN_SPEC:-@openclaw/whatsapp}
      OPENCLAW_PROVIDER_BRIDGE_SYNC_INTERVAL_SEC: ${OPENCLAW_PROVIDER_BRIDGE_SYNC_INTERVAL_SEC:-30}
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,unbound,egress-proxy,openclaw,openclaw-gateway,openclaw-sandbox,openclaw-relay,localhost,127.0.0.1
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/config:/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/config/bridge:/config/bridge
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/config/overlay:/overlay
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/logs:/logs
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.token:/run/secrets/openclaw.token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/telegram.bot_token:/run/secrets/telegram.bot_token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/discord.bot_token:/run/secrets/discord.bot_token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/slack.bot_token:/run/secrets/slack.bot_token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/slack.app_token:/run/secrets/slack.app_token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/slack.signing_secret:/run/secrets/slack.signing_secret:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import json,pathlib,sys;
          payload=json.loads(pathlib.Path("/state/provider-bridge-status.json").read_text(encoding="utf-8"));
          sys.exit(0 if isinstance(payload, dict) and "ready" in payload else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic
      - agentic-egress

  openclaw-gateway:
    image: agentic/optional-modules:local
    build:
      context: ..
      dockerfile: deployments/optional/Dockerfile
      args:
        OPENCLAW_INSTALL_CLI_SCRIPT: ${AGENTIC_OPENCLAW_INSTALL_CLI_SCRIPT:-https://openclaw.ai/install-cli.sh}
        OPENCLAW_INSTALL_VERSION: ${AGENTIC_OPENCLAW_INSTALL_VERSION:-latest}
    entrypoint:
      - /app/openclaw_gateway_entrypoint.sh
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPENCLAW_GATEWAY_CPUS:-${AGENTIC_LIMIT_CORE_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPENCLAW_GATEWAY_MEM:-${AGENTIC_LIMIT_CORE_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OPENCLAW_GATEWAY_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_GATEWAY_PORT: 18789
      OPENCLAW_GATEWAY_PROXY_PORT: 8114
      OPENCLAW_GATEWAY_PROXY_METRICS_HOST: 0.0.0.0
      OPENCLAW_GATEWAY_PROXY_METRICS_PORT: 9114
      OPENCLAW_GATEWAY_AUTH_MODE: token
      OPENCLAW_GATEWAY_BIND_MODE: loopback
      OPENCLAW_GATEWAY_TAILSCALE_MODE: off
      OPENCLAW_CAPTURE_LAYER_STATE_ON_EXIT: "0"
      HOME: /state/cli/openclaw-home
      OPENCLAW_HOME: /state/cli/openclaw-home
      OPENCLAW_CONFIG_PATH: /tmp/openclaw.effective.json
      OPENCLAW_IMMUTABLE_CONFIG_FILE: /config/immutable/openclaw.stack-config.v1.json
      OPENCLAW_PROVIDER_BRIDGE_FILE: /config/bridge/openclaw.provider-bridge.json
      OPENCLAW_OPERATOR_OVERLAY_FILE: /overlay/openclaw.operator-overlay.json
      OPENCLAW_STATE_CONFIG_FILE: /state/cli/openclaw-home/openclaw.state.json
      OPENCLAW_CONFIG_GATEWAY_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram.bot_token
      OPENCLAW_DISCORD_BOT_TOKEN_FILE: /run/secrets/discord.bot_token
      OPENCLAW_SLACK_BOT_TOKEN_FILE: /run/secrets/slack.bot_token
      OPENCLAW_SLACK_APP_TOKEN_FILE: /run/secrets/slack.app_token
      OPENCLAW_SLACK_SIGNING_SECRET_FILE: /run/secrets/slack.signing_secret
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,unbound,egress-proxy,openclaw,openclaw-gateway,openclaw-sandbox,openclaw-relay,localhost,127.0.0.1
    depends_on:
      openclaw-provider-bridge:
        condition: service_healthy
      openclaw:
        condition: service_healthy
    ports:
      - 127.0.0.1:${OPENCLAW_GATEWAY_HOST_PORT:-18789}:8114
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/config:/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/config/bridge:/config/bridge:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/config/overlay:/overlay
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/logs:/logs
      - ${AGENTIC_OPENCLAW_WORKSPACES_DIR:-${AGENTIC_ROOT:-/srv/agentic}/openclaw/workspaces}:/workspace
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.token:/run/secrets/openclaw.token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/telegram.bot_token:/run/secrets/telegram.bot_token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/discord.bot_token:/run/secrets/discord.bot_token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/slack.bot_token:/run/secrets/slack.bot_token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/slack.app_token:/run/secrets/slack.app_token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/slack.signing_secret:/run/secrets/slack.signing_secret:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8114/", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - agentic
      - agentic-egress

  openclaw-sandbox:
    image: agentic/optional-modules:local
    build:
      context: ..
      dockerfile: deployments/optional/Dockerfile
      args:
        OPENCLAW_INSTALL_CLI_SCRIPT: ${AGENTIC_OPENCLAW_INSTALL_CLI_SCRIPT:-https://openclaw.ai/install-cli.sh}
        OPENCLAW_INSTALL_VERSION: ${AGENTIC_OPENCLAW_INSTALL_VERSION:-latest}
    command:
      - openclaw-sandbox
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPENCLAW_SANDBOX_CPUS:-${AGENTIC_LIMIT_CORE_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPENCLAW_SANDBOX_MEM:-${AGENTIC_LIMIT_CORE_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OPTIONAL_BIND_HOST: 0.0.0.0
      OPTIONAL_BIND_PORT: 8112
      AUDIT_LOG_PATH: /logs/audit.jsonl
      OPENCLAW_SANDBOX_AUTH_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_SANDBOX_TOOL_ALLOWLIST_FILE: /config/tool_allowlist.txt
      OPENCLAW_SANDBOX_PROFILE_FILE: /config/integration-profile.current.json
      OPENCLAW_SANDBOX_OPERATOR_RUNTIME_FILE: /config/operator-runtime.v1.json
      OPENCLAW_SANDBOX_MODULE_MANIFEST_FILE: /config/module/openclaw.module-manifest.v1.json
      OPENCLAW_SANDBOX_DEFAULT_MODEL: ${AGENTIC_DEFAULT_MODEL:-qwen3-coder:30b}
      OPENCLAW_SANDBOX_DEFAULT_SESSION_ID: ${OPENCLAW_SANDBOX_DEFAULT_SESSION_ID:-default-session}
      OPENCLAW_SANDBOX_PROVIDER_LABEL: ${OPENCLAW_SANDBOX_PROVIDER_LABEL:-ollama-gate}
      OPENCLAW_SANDBOX_SESSION_TTL_SEC: ${OPENCLAW_SANDBOX_SESSION_TTL_SEC:-1800}
      OPENCLAW_SANDBOX_REAP_INTERVAL_SEC: ${OPENCLAW_SANDBOX_REAP_INTERVAL_SEC:-15}
      OPENCLAW_SANDBOX_REGISTRY_FILE: /state/session-sandboxes.json
      OPENCLAW_SANDBOX_OPERATOR_REGISTRY_FILE: /state/openclaw-state-registry.v1.json
      OPENCLAW_SANDBOX_STATE_ROOT: /state/sandboxes
      OPENCLAW_SANDBOX_WORKSPACES_DIR: /sandbox-workspaces
      OPENCLAW_APPROVALS_STATE_DIR: /approvals
      OPENCLAW_APPROVALS_PENDING_TTL_SEC: ${OPENCLAW_APPROVALS_PENDING_TTL_SEC:-604800}
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,unbound,egress-proxy,openclaw,openclaw-sandbox,localhost,127.0.0.1
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/config:/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/sandbox/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/sandbox/workspaces:/sandbox-workspaces
      - ${AGENTIC_OPENCLAW_WORKSPACES_DIR:-${AGENTIC_ROOT:-/srv/agentic}/openclaw/workspaces}:/workspace
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/state/approvals:/approvals
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/logs:/logs
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.token:/run/secrets/openclaw.token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/git-forge/openclaw.password:/run/secrets/git-forge.password:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8112/healthz", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

  openclaw-relay:
    image: agentic/optional-modules:local
    build:
      context: ..
      dockerfile: deployments/optional/Dockerfile
      args:
        OPENCLAW_INSTALL_CLI_SCRIPT: ${AGENTIC_OPENCLAW_INSTALL_CLI_SCRIPT:-https://openclaw.ai/install-cli.sh}
        OPENCLAW_INSTALL_VERSION: ${AGENTIC_OPENCLAW_INSTALL_VERSION:-latest}
    command:
      - openclaw-relay
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_OPENCLAW_RELAY_CPUS:-${AGENTIC_LIMIT_CORE_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_OPENCLAW_RELAY_MEM:-${AGENTIC_LIMIT_CORE_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OPTIONAL_BIND_HOST: 0.0.0.0
      OPTIONAL_BIND_PORT: 8113
      AUDIT_LOG_PATH: /logs/relay-audit.jsonl
      OPENCLAW_RELAY_PROVIDER_TARGETS_FILE: /config/relay_targets.json
      OPENCLAW_RELAY_TELEGRAM_SECRET_FILE: /run/secrets/openclaw.relay.telegram.secret
      OPENCLAW_RELAY_WHATSAPP_SECRET_FILE: /run/secrets/openclaw.relay.whatsapp.secret
      OPENCLAW_RELAY_FORWARD_URL: http://openclaw:8111/v1/webhooks/dm
      OPENCLAW_RELAY_OPENCLAW_TOKEN_FILE: /run/secrets/openclaw.token
      OPENCLAW_RELAY_OPENCLAW_WEBHOOK_SECRET_FILE: /run/secrets/openclaw.webhook_secret
      OPENCLAW_RELAY_FORWARD_TIMEOUT_SEC: ${OPENCLAW_RELAY_FORWARD_TIMEOUT_SEC:-4}
      OPENCLAW_RELAY_MAX_ATTEMPTS: ${OPENCLAW_RELAY_MAX_ATTEMPTS:-10}
      OPENCLAW_RELAY_RETRY_BASE_SEC: ${OPENCLAW_RELAY_RETRY_BASE_SEC:-2}
      OPENCLAW_RELAY_RETRY_MAX_SEC: ${OPENCLAW_RELAY_RETRY_MAX_SEC:-120}
      OPENCLAW_RELAY_POLL_INTERVAL_SEC: ${OPENCLAW_RELAY_POLL_INTERVAL_SEC:-1.5}
      OPENCLAW_RELAY_SIGNATURE_HEADER: ${OPENCLAW_RELAY_SIGNATURE_HEADER:-X-Relay-Signature}
      OPENCLAW_RELAY_TIMESTAMP_HEADER: ${OPENCLAW_RELAY_TIMESTAMP_HEADER:-X-Relay-Timestamp}
      OPENCLAW_RELAY_EVENT_ID_HEADER: ${OPENCLAW_RELAY_EVENT_ID_HEADER:-X-Provider-Event-ID}
      OPENCLAW_RELAY_MAX_SKEW_SEC: ${OPENCLAW_RELAY_MAX_SKEW_SEC:-300}
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,unbound,egress-proxy,openclaw,openclaw-relay,localhost,127.0.0.1
    depends_on:
      openclaw:
        condition: service_healthy
    ports:
      - 127.0.0.1:${OPENCLAW_RELAY_HOST_PORT:-18112}:8113
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/config:/config:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/relay/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/openclaw/relay/logs:/logs
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.token:/run/secrets/openclaw.token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.webhook_secret:/run/secrets/openclaw.webhook_secret:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.relay.telegram.secret:/run/secrets/openclaw.relay.telegram.secret:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/openclaw.relay.whatsapp.secret:/run/secrets/openclaw.relay.whatsapp.secret:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:8113/healthz", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - agentic

  trtllm:
    image: agentic/trtllm-runtime:local
    build:
      context: ..
      dockerfile: deployments/trtllm/Dockerfile
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_TRTLLM_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-8.00}}
    mem_limit: ${AGENTIC_LIMIT_TRTLLM_MEM:-0}
    gpus: all
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    user: "${TRTLLM_CONTAINER_USER:-${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles:
      - trt
    environment:
      HOME: /state/home
      HF_HOME: /models/huggingface
      HF_HUB_CACHE: /models/huggingface/hub
      TRANSFORMERS_CACHE: /models/huggingface
      XDG_CACHE_HOME: /state/cache
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      ALL_PROXY: http://egress-proxy:3128
      NO_PROXY: 127.0.0.1,localhost,trtllm
      TRTLLM_LISTEN_HOST: 0.0.0.0
      TRTLLM_PORT: 11436
      TRTLLM_RUNTIME_MODE: ${TRTLLM_RUNTIME_MODE:-auto}
      TRTLLM_NATIVE_HOST: 127.0.0.1
      TRTLLM_NATIVE_PORT: 8355
      TRTLLM_NATIVE_BACKEND: ${TRTLLM_NATIVE_BACKEND:-}
      TRTLLM_NATIVE_LOG_LEVEL: ${TRTLLM_NATIVE_LOG_LEVEL:-info}
      TRTLLM_NATIVE_MODEL_POLICY: ${TRTLLM_NATIVE_MODEL_POLICY:-auto}
      TRTLLM_NATIVE_MAX_BATCH_SIZE: ${TRTLLM_NATIVE_MAX_BATCH_SIZE:-1}
      TRTLLM_NATIVE_MAX_NUM_TOKENS: ${TRTLLM_NATIVE_MAX_NUM_TOKENS:-4096}
      TRTLLM_NATIVE_MAX_SEQ_LEN: ${TRTLLM_NATIVE_MAX_SEQ_LEN:-32768}
      TRTLLM_NATIVE_ENABLE_CUDA_GRAPH: ${TRTLLM_NATIVE_ENABLE_CUDA_GRAPH:-false}
      TRTLLM_NATIVE_CUDA_GRAPH_MAX_BATCH_SIZE: ${TRTLLM_NATIVE_CUDA_GRAPH_MAX_BATCH_SIZE:-1}
      TRTLLM_NATIVE_CUDA_GRAPH_ENABLE_PADDING: ${TRTLLM_NATIVE_CUDA_GRAPH_ENABLE_PADDING:-false}
      TRTLLM_NATIVE_MOE_BACKEND: ${TRTLLM_NATIVE_MOE_BACKEND:-CUTLASS}
      TRTLLM_NATIVE_ENABLE_BLOCK_REUSE: ${TRTLLM_NATIVE_ENABLE_BLOCK_REUSE:-false}
      TRTLLM_NATIVE_FREE_GPU_MEMORY_FRACTION: ${TRTLLM_NATIVE_FREE_GPU_MEMORY_FRACTION:-0.8}
      TRTLLM_NATIVE_START_TIMEOUT_SECONDS: ${TRTLLM_NATIVE_START_TIMEOUT_SECONDS:-7200}
      TRTLLM_TOOL_PARSER: ${TRTLLM_TOOL_PARSER:-qwen3_coder}
      TRTLLM_REASONING_PARSER: ${TRTLLM_REASONING_PARSER:-nano-v3}
      TRTLLM_HF_TOKEN_FILE: /run/secrets/huggingface.token
      TRTLLM_MODELS_DIR: /models
      TRTLLM_NVFP4_LOCAL_MODEL_DIR: ${TRTLLM_NVFP4_LOCAL_MODEL_DIR:-/models/trtllm-model}
      TRTLLM_NVFP4_HF_REPO: ${TRTLLM_NVFP4_HF_REPO:-nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8}
      TRTLLM_NVFP4_HF_REVISION: ${TRTLLM_NVFP4_HF_REVISION:-main}
      TRTLLM_STATE_DIR: /state
      TRTLLM_LOGS_DIR: /logs
      TRTLLM_MODELS: ${TRTLLM_MODELS:-https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8}
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/trtllm/models:/models
      - ${AGENTIC_ROOT:-/srv/agentic}/trtllm/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/trtllm/logs:/logs
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/huggingface.token:/run/secrets/huggingface.token:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python3 -c 'import sys,urllib.request;
          sys.exit(0 if urllib.request.urlopen("http://127.0.0.1:11436/healthz", timeout=3).status == 200 else 1)'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      agentic-llm:
        priority: 100
      agentic-egress:
        priority: 1000

  toolbox:
    image: ghcr.io/nicolaka/netshoot:latest
    command:
      - /bin/sh
      - -lc
      - sleep infinity
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_TOOLBOX_CPUS:-${AGENTIC_LIMIT_CORE_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_TOOLBOX_MEM:-${AGENTIC_LIMIT_CORE_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - agentic
    depends_on:
      - unbound
      - egress-proxy
      - ollama-gate
    healthcheck:
      test:
        - CMD-SHELL
        - test -r /etc/os-release
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  unbound:
    image: klutchell/unbound:latest
    command:
      - -d
      - -c
      - /etc/unbound/unbound.conf
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_UNBOUND_CPUS:-${AGENTIC_LIMIT_CORE_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_UNBOUND_MEM:-${AGENTIC_LIMIT_CORE_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    # Explicit root exception: DNS service binds privileged port 53 and drops privileges internally.
    user: "0:0"
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/dns/unbound.conf:/etc/unbound/unbound.conf:ro
    healthcheck:
      test:
        - CMD
        - unbound-checkconf
        - /etc/unbound/unbound.conf
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      agentic:
        priority: 100
      agentic-egress:
        priority: 1000

  egress-proxy:
    image: ubuntu/squid:latest
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_EGRESS_PROXY_CPUS:-${AGENTIC_LIMIT_CORE_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_EGRESS_PROXY_MEM:-${AGENTIC_LIMIT_CORE_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    # Explicit root exception: squid starts as root before dropping to uid/gid proxy.
    user: "0:0"
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/proxy/config/squid.conf:/etc/squid/squid.conf:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/proxy/allowlist.txt:/etc/squid/allowlist.txt:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/proxy/logs:/var/log/squid
    networks:
      agentic:
        priority: 100
      agentic-egress:
        priority: 1000
    healthcheck:
      test:
        - CMD-SHELL
        - squid -k check -f /etc/squid/squid.conf >/dev/null 2>&1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  agentic:
    name: ${AGENTIC_NETWORK:-agentic}
    driver: bridge
    internal: true
  agentic-llm:
    name: ${AGENTIC_LLM_NETWORK:-agentic-llm}
    driver: bridge
    internal: true
  agentic-egress:
    name: ${AGENTIC_EGRESS_NETWORK:-agentic-egress}
    driver: bridge

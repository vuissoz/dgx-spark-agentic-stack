services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    gpus: all
    ports:
      - 127.0.0.1:11434:11434
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_MODELS: /root/.ollama/models
    volumes:
      - ${OLLAMA_MODELS_DIR:-${AGENTIC_ROOT:-/srv/agentic}/ollama/models}:/root/.ollama/models
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -lc 'exec 3<>/dev/tcp/127.0.0.1/11434 &&
          printf "GET /api/version HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 &&
          grep -q "200 OK" <&3'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      agentic:
        priority: 100
      agentic-egress:
        priority: 1000

  toolbox:
    image: ghcr.io/nicolaka/netshoot:latest
    command:
      - /bin/sh
      - -lc
      - sleep infinity
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - agentic
    depends_on:
      - unbound
      - egress-proxy

  unbound:
    image: klutchell/unbound:latest
    command:
      - -d
      - -c
      - /etc/unbound/unbound.conf
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/dns/unbound.conf:/etc/unbound/unbound.conf:ro
    networks:
      agentic:
        priority: 100
      agentic-egress:
        priority: 1000

  egress-proxy:
    image: ubuntu/squid:latest
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/proxy/config/squid.conf:/etc/squid/squid.conf:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/proxy/allowlist.txt:/etc/squid/allowlist.txt:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/proxy/logs:/var/log/squid
    networks:
      agentic:
        priority: 100
      agentic-egress:
        priority: 1000
    healthcheck:
      test:
        - CMD-SHELL
        - squid -k check -f /etc/squid/squid.conf >/dev/null 2>&1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  agentic:
    name: ${AGENTIC_NETWORK:-agentic}
    driver: bridge
    internal: true
  agentic-egress:
    name: ${AGENTIC_EGRESS_NETWORK:-agentic-egress}
    driver: bridge

services:
  agentic-claude:
    image: ${AGENTIC_AGENT_BASE_IMAGE:-agentic/agent-cli-base:local}
    build:
      context: ${AGENTIC_AGENT_BASE_BUILD_CONTEXT:-..}
      dockerfile: ${AGENTIC_AGENT_BASE_DOCKERFILE:-deployments/images/agent-cli-base/Dockerfile}
      args:
        AGENT_CLI_INSTALL_MODE: ${AGENTIC_AGENT_CLI_INSTALL_MODE:-best-effort}
        CODEX_CLI_NPM_SPEC: ${AGENTIC_CODEX_CLI_NPM_SPEC:-@openai/codex@latest}
        CLAUDE_CODE_NPM_SPEC: ${AGENTIC_CLAUDE_CODE_NPM_SPEC:-@anthropic-ai/claude-code@latest}
        OPENCODE_NPM_SPEC: ${AGENTIC_OPENCODE_NPM_SPEC:-opencode-ai@latest}
        PI_CODING_AGENT_NPM_SPEC: ${AGENTIC_PI_CODING_AGENT_NPM_SPEC:-@mariozechner/pi-coding-agent@latest}
        OPENHANDS_INSTALL_SCRIPT: ${AGENTIC_OPENHANDS_INSTALL_SCRIPT:-https://install.openhands.dev/install.sh}
        OPENCLAW_INSTALL_CLI_SCRIPT: ${AGENTIC_OPENCLAW_INSTALL_CLI_SCRIPT:-https://openclaw.ai/install-cli.sh}
        OPENCLAW_INSTALL_VERSION: ${AGENTIC_OPENCLAW_INSTALL_VERSION:-latest}
        VIBE_INSTALL_SCRIPT: ${AGENTIC_VIBE_INSTALL_SCRIPT:-https://mistral.ai/vibe/install.sh}
    restart: unless-stopped
    cpus: ${AGENTIC_LIMIT_AGENTIC_CLAUDE_CPUS:-${AGENTIC_LIMIT_AGENTS_CPUS:-${AGENTIC_LIMIT_DEFAULT_CPUS:-1.00}}}
    mem_limit: ${AGENTIC_LIMIT_AGENTIC_CLAUDE_MEM:-${AGENTIC_LIMIT_AGENTS_MEM:-${AGENTIC_LIMIT_DEFAULT_MEM:-1g}}}
    init: true
    user: "${AGENT_RUNTIME_UID:-1000}:${AGENT_RUNTIME_GID:-1000}"
    read_only: true
    tmpfs:
      - /tmp
      - /workspace
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:${AGENTIC_AGENT_NO_NEW_PRIVILEGES:-true}
    environment:
      AGENT_TOOL: claude
      AGENT_PRIMARY_CLI: claude
      AGENT_SESSION: claude
      AGENT_HOME: /state/home
      AGENT_WORKSPACE: /workspace
      AGENT_STATE_DIR: /state
      AGENT_LOGS_DIR: /logs
      HOME: /state/home
      XDG_CONFIG_HOME: /state/home/.config
      XDG_CACHE_HOME: /state/home/.cache
      OLLAMA_BASE_URL: http://ollama-gate:11435
      GATE_MCP_URL: http://gate-mcp:8123
      GATE_MCP_AUTH_TOKEN_FILE: /run/secrets/gate_mcp.token
      AGENTIC_DEFAULT_MODEL: ${AGENTIC_DEFAULT_MODEL:-qwen3-coder:30b}
      AGENTIC_DEFAULT_MODEL_CONTEXT_WINDOW: ${AGENTIC_DEFAULT_MODEL_CONTEXT_WINDOW:-50909}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-${AGENTIC_DEFAULT_MODEL_CONTEXT_WINDOW:-50909}}
      AGENTIC_CONTEXT_COMPACTION_SOFT_PERCENT: ${AGENTIC_CONTEXT_COMPACTION_SOFT_PERCENT:-75}
      AGENTIC_CONTEXT_COMPACTION_DANGER_PERCENT: ${AGENTIC_CONTEXT_COMPACTION_DANGER_PERCENT:-90}
      AGENTIC_CONTEXT_BUDGET_TOKENS: ${AGENTIC_CONTEXT_BUDGET_TOKENS:-50909}
      AGENTIC_CONTEXT_COMPACTION_SOFT_TOKENS: ${AGENTIC_CONTEXT_COMPACTION_SOFT_TOKENS:-38181}
      AGENTIC_CONTEXT_COMPACTION_DANGER_TOKENS: ${AGENTIC_CONTEXT_COMPACTION_DANGER_TOKENS:-45818}
      AGENTIC_GIT_FORGE_BASE_URL: http://optional-forgejo:3000
      AGENTIC_GIT_FORGE_SHARED_NAMESPACE: ${GIT_FORGE_SHARED_NAMESPACE:-agentic}
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      NO_PROXY: ollama-gate,gate-mcp,optional-forgejo,unbound,egress-proxy,localhost,127.0.0.1
    volumes:
      - ${AGENTIC_ROOT:-/srv/agentic}/claude/state:/state
      - ${AGENTIC_ROOT:-/srv/agentic}/claude/logs:/logs
      - ${AGENTIC_CLAUDE_WORKSPACES_DIR:-${AGENTIC_AGENT_WORKSPACES_ROOT:-${AGENTIC_ROOT:-/srv/agentic}}/claude/workspaces}:/workspace
      - ${AGENTIC_ROOT:-/srv/agentic}/shared-ro:/shared-ro:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/shared-rw:/shared-rw
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/gate_mcp.token:/run/secrets/gate_mcp.token:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/runtime/git-forge/claude.password:/run/secrets/git-forge.password:ro
      - ${AGENTIC_ROOT:-/srv/agentic}/secrets/ssh/claude:/home/agent/.ssh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - tmux has-session -t claude
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - agentic

